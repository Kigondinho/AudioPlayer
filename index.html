<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Audio Player</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="scene">
    <div class="player-container">

      <!-- Hidden native audio element -->
      <audio id="audio-element" preload="metadata">
        <source src="audio.mp3" type="audio/mpeg" />
        <!-- Fallback silent audio via data URI so controls still work without a real file -->
      </audio>

      <!-- Decorative top bar -->
      <div class="top-bar">
        <span class="brand">◈ STUDIO</span>
        <span class="status-dot" id="status-dot"></span>
      </div>

      <!-- Track info -->
      <div class="track-info">
        <div class="track-title" id="track-title">audio.mp3</div>
        <div class="track-sub">STEREO · 44.1 KHz</div>
      </div>

      <!-- Waveform visualizer (decorative bars) -->
      <div class="waveform" id="waveform">
        <div class="bars-container" id="bars-container"></div>
      </div>

      <!-- Progress bar -->
      <div class="progress-wrap">
        <span class="time-label" id="current-time">0:00</span>
        <input type="range" id="seek-slider" class="seek-slider" min="0" max="100" value="0" step="0.1" />
        <span class="time-label" id="duration">0:00</span>
      </div>

      <!-- Controls -->
      <div class="controls">

        <!-- Rewind 10s -->
        <button class="ctrl-btn secondary" id="rewind-btn" title="Rewind 10s">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"></polyline>
            <path d="M3.51 15a9 9 0 1 0 .49-3.2"></path>
            <text x="8" y="15" font-size="6" fill="currentColor" stroke="none" font-family="monospace">10</text>
          </svg>
        </button>

        <!-- Play button -->
        <button class="ctrl-btn play-btn" id="play-btn" title="Play">
          <svg id="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 19,12 5,21"></polygon>
          </svg>
        </button>

        <!-- Pause button -->
        <button class="ctrl-btn pause-btn hidden" id="pause-btn" title="Pause">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
          </svg>
        </button>

        <!-- Forward 10s -->
        <button class="ctrl-btn secondary" id="forward-btn" title="Forward 10s">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-.49-3.2"></path>
            <text x="8" y="15" font-size="6" fill="currentColor" stroke="none" font-family="monospace">10</text>
          </svg>
        </button>

      </div>

      <!-- Volume control -->
      <div class="volume-section">
        <button class="mute-btn" id="mute-btn" title="Mute">
          <svg id="volume-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
        </button>
        <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.01" value="0.8" />
        <span class="vol-label" id="vol-label">80%</span>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
